name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Portfolio 빌드
      - name: Install Portfolio dependencies
        working-directory: __Portfolio
        run: npm install

      - name: Build Portfolio
        working-directory: __Portfolio
        run: npm run build

      # 2. Librarian 빌드
      - name: Install Librarian dependencies
        working-directory: Librarian
        run: npm install

      - name: Build Librarian
        working-directory: Librarian
        run: npx vite build

      # 3. 빌드 결과 합치기
      - name: Merge builds
        run: |
          mkdir -p dist
          cp -r __Portfolio/dist/* dist/
          mkdir -p dist/librarian
          cp -r Librarian/dist/* dist/librarian/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
